spring.application.name=Api_Gateway

server.port=8086

# ================================
# REDIS
# ================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=E_library_2026
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=10
spring.data.redis.lettuce.pool.max-idle=5
spring.data.redis.lettuce.pool.min-idle=1

# ================================
# EUREKA
# ================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# ================================
# JWT
# ================================
jwt.secret=10ccf6ca7a7e8b7ae52860580b6d87ef65fb292133748be1220888a2566e0649
jwt.expiration=86400000

# ================================
# RATE LIMIT
# ================================
rate-limit.replenish-rate=20
rate-limit.burst-capacity=40

# ================================
# ROUTE 0 - Auth Service (Public)
# ================================
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://AUTHENTICATION
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

# ================================
# ROUTE 1 - BookUpload Service (Protected)
# ================================
spring.cloud.gateway.routes[1].id=book-upload-service
spring.cloud.gateway.routes[1].uri=lb://BOOKUPLOAD
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/books/**
spring.cloud.gateway.routes[1].filters[0]=AuthFilter
spring.cloud.gateway.routes[1].filters[1].name=RequestRateLimiter
spring.cloud.gateway.routes[1].filters[1].args.redis-rate-limiter.replenishRate=20
spring.cloud.gateway.routes[1].filters[1].args.redis-rate-limiter.burstCapacity=40
spring.cloud.gateway.routes[1].filters[1].args.redis-rate-limiter.requestedTokens=1
spring.cloud.gateway.routes[1].filters[1].args.key-resolver=#{@userKeyResolver}

# ================================
# ROUTE 2 - Subscription Public (No JWT)
# Razorpay initiate & verify - no auth needed
# Must be BEFORE subscription-protected route
# ================================
spring.cloud.gateway.routes[2].id=subscription-public
spring.cloud.gateway.routes[2].uri=lb://SUBSCRIPTION-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/subscriptions/initiate,/api/v1/subscriptions/verify

# ================================
# ROUTE 3 - Subscription Protected (JWT + Rate Limit)
# All other subscription endpoints need auth
# ================================
spring.cloud.gateway.routes[3].id=subscription-protected
spring.cloud.gateway.routes[3].uri=lb://SUBSCRIPTION-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/subscriptions/**
spring.cloud.gateway.routes[3].filters[0]=AuthFilter
spring.cloud.gateway.routes[3].filters[1].name=RequestRateLimiter
spring.cloud.gateway.routes[3].filters[1].args.redis-rate-limiter.replenishRate=20
spring.cloud.gateway.routes[3].filters[1].args.redis-rate-limiter.burstCapacity=40
spring.cloud.gateway.routes[3].filters[1].args.redis-rate-limiter.requestedTokens=1
spring.cloud.gateway.routes[3].filters[1].args.key-resolver=#{@userKeyResolver}

# ================================
# ROUTE 4 - Mail Service (Protected)
# ================================
spring.cloud.gateway.routes[4].id=mail-service
spring.cloud.gateway.routes[4].uri=lb://MAIL-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/mail/**
spring.cloud.gateway.routes[4].filters[0]=AuthFilter
spring.cloud.gateway.routes[4].filters[1].name=RequestRateLimiter
spring.cloud.gateway.routes[4].filters[1].args.redis-rate-limiter.replenishRate=20
spring.cloud.gateway.routes[4].filters[1].args.redis-rate-limiter.burstCapacity=40
spring.cloud.gateway.routes[4].filters[1].args.redis-rate-limiter.requestedTokens=1
spring.cloud.gateway.routes[4].filters[1].args.key-resolver=#{@userKeyResolver}

# ================================
# ROUTE 5 - AI Health Check (Public - No JWT)
# ================================
spring.cloud.gateway.routes[5].id=ai-health
spring.cloud.gateway.routes[5].uri=lb://AI-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/ai/health

# ================================
# ROUTE 6 - AI TTS Languages (Public - No JWT)
# Anyone can view available voices/languages
# ================================
spring.cloud.gateway.routes[6].id=ai-tts-languages
spring.cloud.gateway.routes[6].uri=lb://AI-SERVICE
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/ai/tts/languages

# ================================
# ROUTE 7 - AI Taste Analysis & Recommendations (Protected)
# ================================
spring.cloud.gateway.routes[7].id=ai-analysis
spring.cloud.gateway.routes[7].uri=lb://AI-SERVICE
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/ai/analysis/**
spring.cloud.gateway.routes[7].filters[0]=AuthFilter
spring.cloud.gateway.routes[7].filters[1].name=RequestRateLimiter
spring.cloud.gateway.routes[7].filters[1].args.redis-rate-limiter.replenishRate=10
spring.cloud.gateway.routes[7].filters[1].args.redis-rate-limiter.burstCapacity=20
spring.cloud.gateway.routes[7].filters[1].args.redis-rate-limiter.requestedTokens=1
spring.cloud.gateway.routes[7].filters[1].args.key-resolver=#{@userKeyResolver}

# ================================
# ROUTE 8 - AI Text-to-Speech / Sarvam Bulbul v3 (Protected)
# Lower rate limit - audio generation is resource-heavy
# ================================
spring.cloud.gateway.routes[8].id=ai-tts
spring.cloud.gateway.routes[8].uri=lb://AI-SERVICE
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/ai/tts/**
spring.cloud.gateway.routes[8].filters[0]=AuthFilter
spring.cloud.gateway.routes[8].filters[1].name=RequestRateLimiter
spring.cloud.gateway.routes[8].filters[1].args.redis-rate-limiter.replenishRate=5
spring.cloud.gateway.routes[8].filters[1].args.redis-rate-limiter.burstCapacity=10
spring.cloud.gateway.routes[8].filters[1].args.redis-rate-limiter.requestedTokens=1
spring.cloud.gateway.routes[8].filters[1].args.key-resolver=#{@userKeyResolver}

# ================================
# ROUTE 9 - AI PDF Summarization / Sarvam-M (Protected)
# Strictest rate limit - most expensive AI operation
# ================================
spring.cloud.gateway.routes[9].id=ai-summary
spring.cloud.gateway.routes[9].uri=lb://AI-SERVICE
spring.cloud.gateway.routes[9].predicates[0]=Path=/api/ai/summary/**
spring.cloud.gateway.routes[9].filters[0]=AuthFilter
spring.cloud.gateway.routes[9].filters[1].name=RequestRateLimiter
spring.cloud.gateway.routes[9].filters[1].args.redis-rate-limiter.replenishRate=3
spring.cloud.gateway.routes[9].filters[1].args.redis-rate-limiter.burstCapacity=6
spring.cloud.gateway.routes[9].filters[1].args.redis-rate-limiter.requestedTokens=1
spring.cloud.gateway.routes[9].filters[1].args.key-resolver=#{@userKeyResolver}

# ================================
# LOGGING
# ================================
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.com.yourapp.gateway=DEBUG
logging.level.org.springframework.data.redis=DEBUG

# ================================
# ACTUATOR
# ================================
management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.gateway.enabled=true