# ? CHANGE 1 ? Must match lb://SUBSCRIPTION-SERVICE in gateway (was: subscriptionpayment)
spring.application.name=SUBSCRIPTION-SERVICE

server.port=8085

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/subscriptionpayment
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# HikariCP
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=SubscriptionHikariPool

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Kafka Producer
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3

# Kafka Consumer
spring.kafka.consumer.group-id=subscription-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.enable-auto-commit=true
spring.kafka.consumer.auto-commit-interval=1000

# ? CHANGE 3 ? Add Kafka topic name (used in Producer & Consumer)
kafka.topic.subscription-events=subscription-events

# Razorpay
razorpay.key.id=rzp_test_SMJEz5raYbXFbm
razorpay.key.secret=wOFsf2DH8CmyJozUPmz5r2u1

# Thread Pools
thread.pool.core-size=10
thread.pool.max-size=50
thread.pool.queue-capacity=200
thread.pool.keep-alive=60
thread.pool.name-prefix=SubAsync-

batch.thread.pool.core-size=5
batch.thread.pool.max-size=20
batch.thread.pool.name-prefix=SubBatch-

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# Logging
logging.level.com.elibrary.subscription=DEBUG
logging.level.org.springframework.kafka=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Kolkata