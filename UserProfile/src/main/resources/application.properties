# ?? Server ??????????????????????????????????????????????
server.port=8082

# ?? Application ?????????????????????????????????????????
spring.application.name=USERPROFILE

# ?? Database (MySQL) ????????????????????????????????????
spring.datasource.url=jdbc:mysql://localhost:3306/userprofile?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=tiger
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ?? JPA / Hibernate ?????????????????????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ?? Eureka ???????????????????????????????????????????????
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=30
eureka.client.initial-instance-info-replication-interval-seconds=5

# ?? Feign ????????????????????????????????????????????????
spring.cloud.openfeign.client.config.BookUpload.connect-timeout=500
spring.cloud.openfeign.client.config.BookUpload.read-timeout=1500
spring.cloud.openfeign.circuitbreaker.enabled=true
logging.level.com.user.UserProfile.Feign=DEBUG

# ?? Circuit Breaker (Resilience4j) ???????????????????????
resilience4j.circuitbreaker.instances.BookUpload.sliding-window-size=10
resilience4j.circuitbreaker.instances.BookUpload.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.BookUpload.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.BookUpload.permitted-number-of-calls-in-half-open-state=3

# ?? Kafka Bootstrap ??????????????????????????????????????
spring.kafka.bootstrap-servers=localhost:9092

# ?? Kafka Admin ??????????????????????????????????????????
# ? Don't crash if Kafka is unavailable on startup
spring.kafka.admin.fail-fast=false
# ? Don't block startup waiting for topic creation
spring.kafka.admin.auto-create=false
# ? Give up after 5s instead of hanging
spring.kafka.admin.operation-timeout=5

# ?? Kafka Producer ???????????????????????????????????????
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
# ? Fail fast if Kafka is down ? prevents 60s hang
spring.kafka.producer.properties.max.block.ms=3000
spring.kafka.producer.properties.request.timeout.ms=3000
spring.kafka.producer.properties.delivery.timeout.ms=5000

# ?? Kafka Consumer ???????????????????????????????????????
spring.kafka.consumer.group-id=userprofile-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
# ? Scoped to your DTO package ? safer than wildcard *
spring.kafka.consumer.properties.spring.json.trusted.packages=com.user.UserProfile.DTO
# ? Required for manual Acknowledgment in ProfileEventConsumer
spring.kafka.listener.ack-mode=manual

# ?? Kafka Topics ?????????????????????????????????????????
kafka.topic.profile-created=profile-created
kafka.topic.profile-updated=profile-updated
kafka.topic.profile-deleted=profile-deleted
# ? Consumed from Authentication service
kafka.topic.user-registered=user-registered

# ?? CORS ?????????????????????????????????????????????????
cors.allowed-origins=http://localhost:3000

# ?? Swagger ??????????????????????????????????????????????
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=method

# ?? HikariCP Connection Pool ?????????????????????????????
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.pool-name=UserProfilePool

# ?? Logging ??????????????????????????????????????????????
logging.level.com.user.UserProfile=DEBUG
logging.level.org.apache.kafka=WARN
logging.level.org.hibernate.SQL=DEBUG