# ?? Server ???????????????????????????????????????????????
server.port=8082

# ?? Application Name ?????????????????????????????????????
spring.application.name=USERPROFILE

# ?? Database ?????????????????????????????????????????????
spring.datasource.url=jdbc:mysql://localhost:3306/userprofile?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=tiger
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ?? JPA / Hibernate ??????????????????????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ?? Eureka ???????????????????????????????????????????????
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

# ?? Kafka ????????????????????????????????????????????????
spring.kafka.bootstrap-servers=localhost:9092

# Producer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# ? Fail fast if Kafka is down ? prevents 60s hang
spring.kafka.producer.properties.max.block.ms=3000
spring.kafka.producer.properties.request.timeout.ms=3000
spring.kafka.producer.properties.delivery.timeout.ms=5000

# Consumer
spring.kafka.consumer.group-id=userprofile-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# ?? Kafka Topics ?????????????????????????????????????????
kafka.topic.profile-created=profile-created
kafka.topic.profile-updated=profile-updated
kafka.topic.profile-deleted=profile-deleted

# ?? Rate Limits (requests per minute per user) ???????????
rate-limit.create=3
rate-limit.read=30
rate-limit.update=5
rate-limit.delete=2